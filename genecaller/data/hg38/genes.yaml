IKBKG:
  gene_strand: "+"
  diff_vcf:
  - data/hg38/IKBKG.vcf.gz
  - data/hg38/IKBKGP1.vcf.gz
  gene_names:
  - IKBKG
  - IKBKGP1
  gene_regions:
  - chrX:154555612-154575000
  - chrX:154632000-154648856
  liftover_regions:
  - - IKBKG
    - chrX:154555612-154572430
  - - IKBKGP1
    - chrX:154632000-154648856
  cn_regions:
   # Split each gene into 3 sub-regions: flank / 11.7kb segment / flank
   # The 11.7kb segment can be deleted OR duplicated (bidirectional CNV)
   - [IKBKG_5prime, chrX:154555612-154558019]
   - [IKBKGdel, chrX:154558020-154569680]
   - [IKBKG_3prime, chrX:154569681-154572430]
   - [IKBKGP1_5prime, chrX:154632000-154634747]
   - [IKBKGP1del, chrX:154634748-154646416]
   - [IKBKGP1_3prime, chrX:154646417-154648856]
  map: data/hg38/IKBKG_IKBKGP1.dat
  # Sex-specific ploidy configuration for non-PAR X-linked gene
  sex_chromosome: "X"
  requires_sex: true
  baseline_cn_male: 1
  baseline_cn_female: 2
  config:
    # cn_diff_priors: keys are CN deviation from baseline (sex-agnostic)
    # The IKBKG gene class converts these to absolute CN priors at runtime
    cn_diff_priors:
      # Flanks: highly conserved, tight around baseline
      IKBKG_5prime: {-2: 0.0001, -1: 0.001, 0: 0.9978, 1: 0.001, 2: 0.0001}
      IKBKG_3prime: {-2: 0.0001, -1: 0.001, 0: 0.9978, 1: 0.001, 2: 0.0001}
      IKBKGP1_5prime: {-2: 0.0001, -1: 0.001, 0: 0.9978, 1: 0.001, 2: 0.0001}
      IKBKGP1_3prime: {-2: 0.0001, -1: 0.001, 0: 0.9978, 1: 0.001, 2: 0.0001}
      # 11.7kb segments: allow deletion and duplication (bidirectional CNV)
      IKBKGdel: {-2: 0.001, -1: 0.02, 0: 0.965, 1: 0.005, 2: 0.005, 3: 0.004}
      IKBKGP1del: {-2: 0.005, -1: 0.10, 0: 0.88, 1: 0.005, 2: 0.005, 3: 0.005}
    mosaic_detection: true
    dp_norm: 1.15
    skip_variant_call: true  # Liftover region outside B1 is highly homogenized;
                             # variant assignment from phased liftover BAM is unreliable
    use_virtual_ad: true     # Use original BAM AD for PSV sites in dark liftover regions
CYP2B6:
  gene_strand: "+"
  diff_vcf:
  - data/hg38/CYP2B6.vcf.gz
  - data/hg38/CYP2B7P.vcf.gz
  gene_names:
  - CYP2B6
  - CYP2B7P
  gene_regions:
  - chr19:40990928-41018700
  - chr19:40923902-40950961
  liftover_regions:
  - - CYP2B6
    - chr19:40990928-40998400,chr19:40999600-41003512,chr19:41003513-41014349,chr19:41014350-41018700
  - - CYP2B7P
    - chr19:40923902-40931370,chr19:40931371-40935280,chr19:40935606-40946395,chr19:40946711-40950961
  map: data/hg38/CYP2B6_CYP2B7P.dat
  recombination_regions:
  - chr19:41007000-41009400   # intron 4 / exon 5 NAHR hotspot (*29/*30 hybrids)
  conversion_regions:
  - region: "chr19:40991282-41018398"
    fusion_detection: true
    five_prime_terminus: 40991282   # + strand: 5' = gene start
    three_prime_terminus: 41018398  # + strand: 3' = gene end
  config:
    prior_type: gaussian     # stable CN=2 (low CNV burden; only rare *29/*30 hybrids)
    cn_prior_std: 0.5
    transition_rate_background: 1e-8   # sticky in stable exonic regions
    transition_rate_hotspot: 0.001     # loose in intron4/exon5 hotspot
    star_allele_file: data/hg38/cyp2b6_star_alleles.tsv
    backbone_file: data/hg38/cyp2b6_backbone.tsv
    # c.785A>G (rs2279343) sits in a PSV-sparse window; its real het is diluted by
    # CYP2B7P reads (paralog ref == A there) and often ML-rejected. Keep the call so
    # the CYP2B6 star caller can LD-rescue it when c.516 (its *6 cis partner) is a
    # confident PASS call. See CYP2B6StarAlleleCaller._ld_rescue.
    keep_rejected_positions:
      - chr19:41009358
RH:
  gene_strand: "+"                 # RHD (gene1) is on the + strand; RHCE is inverted (−)
  diff_vcf:
  - data/hg38/RHD.vcf.gz
  - data/hg38/RHCE.vcf.gz
  gene_names:
  - RHD
  - RHCE
  gene_regions:                    # liftover-coverage span (Step-3 invariant) = .dat mapped-block extent
  - chr1:25271899-25329028
  - chr1:25362421-25421433
  liftover_regions:                # 3 mapped blocks derived from the .dat; the 652bp & 978bp
                                   # gaps between RHD blocks are RHD-specific (no RHCE image) and
                                   # fall in the nonliftover region (called from the original BAM)
  - - RHD
    - chr1:25271899-25301271,chr1:25301924-25322566,chr1:25323545-25329028
  - - RHCE                         # reverse map: RHCE segments run high->low coord
    - chr1:25391162-25421433,chr1:25368883-25390509,chr1:25362421-25367904
  map: data/hg38/RHD_RHCE.dat
  star_allele_file: data/hg38/rh_alleles.tsv   # RhD antigen markers (weak D types 1/2/3, Asian DEL)
  conversion_regions:
  - region: "chr1:25271899-25329028"   # RHD body: RHCE->RHD conversion => RHD-CE-D hybrid / partial-D candidate
    fusion_detection: false            # inverted pair does not form simple terminal fusions (cf. IKBKG)
    min_num_signals: 5                 # RHD/RHCE are ~97% identical => many short normal RHCE-like tracts;
                                       # require >=5 PSVs to call a conversion. Suppresses systematic hotspots
                                       # recurring across a healthy cohort (e.g. chr1:25315165-25315197 in 92%
                                       # of 226 samples, 2 PSVs). Real RHD-CE-D partial-D hybrids span multiple
                                       # exons (many PSVs); precise minimal-conversion/antigen typing is the
                                       # deferred v2 layer. See docs/DEV_HANDBOOK cohort conversion analysis.
  config:
    cn_priors:
      # RHD deletion is COMMON (RhD-negative; ~40% deletion allele freq in Europeans),
      # so the prior is permissive across CN 0/1/2 (patterned on CFH's CFHR31), unlike
      # the conserved-gene priors used elsewhere.
      RHD:  {0: 0.15, 1: 0.35, 2: 0.48, 3: 0.01, 4: 0.01}
      RHCE: {0: 0.0005, 1: 0.001, 2: 0.9975, 3: 0.0005, 4: 0.0005}   # conserved
SBDS:
  gene_strand: "-"                 # SBDS (gene1/functional) is on the − strand; SBDSP1 is inverted (+)
  diff_vcf:
  - data/hg38/SBDS.vcf.gz
  - data/hg38/SBDSP1.vcf.gz
  gene_names:
  - SBDS
  - SBDSP1
  gene_regions:                    # liftover-coverage span (Step-3 invariant) = .dat mapped-block extent
  - chr7:66987871-66995919
  - chr7:72829156-72837201
  liftover_regions:                # single collinear block each (~95% id, no ≥300bp indel; SBDSP1 reverse map)
  - - SBDS
    - chr7:66987871-66995919
  - - SBDSP1
    - chr7:72829156-72837201
  map: data/hg38/SBDS_SBDSP1.dat
  conversion_regions:
  - region: "chr7:66987871-66995919"   # SBDS body: SBDSP1->SBDS conversion (recurrent exon-2 PSVs = SDS alleles)
    fusion_detection: false            # internal conversion, not a terminal fusion
    min_num_signals: 3                 # ~97% identity: require ≥3 PSVs for a tract call (tune Phase H). The two
                                       # recurrent pathogenic PSVs are typed directly in genes/sbds.py regardless.
  config:
    cn_priors:
      # SBDS functional gene highly conserved (large deletions rare); SBDSP1 pseudogene
      # near-conserved (no common recurrent deletion). Tune in Phase H.
      SBDS:   {0: 0.0005, 1: 0.001, 2: 0.9975, 3: 0.0005, 4: 0.0005}
      SBDSP1: {0: 0.01, 1: 0.04, 2: 0.93, 3: 0.01, 4: 0.005}
OTOA:
  gene_strand: "+"                 # OTOA (gene1/functional) + OTOAP1 both + strand → direct duplication
  diff_vcf:
  - data/hg38/OTOA.vcf.gz
  - data/hg38/OTOAP1.vcf.gz
  gene_names:
  - OTOA
  - OTOAP1
  gene_regions:                    # full gene (5'-unique + 3'-dup); OTOAP1 3'-dup only
  - chr16:21663968-21763000
  - chr16:22545168-22579142
  cn_regions:                      # full-gene CN vars: the uniquely-mappable 5'-unique anchors OTOA CN
  - [OTOA, chr16:21663968-21763000]      # (immune to OTOAP1 CNV); the 3'-dup gives the OTOA/OTOAP1 split.
  - [OTOAP1, chr16:22545168-22579142]    # Default (liftover-only) CN vars would leave OTOA blind to the 5'.
  longdel:                         # localized recurrent 5'-unique deletion — a degree of freedom the single
  - [OTOA_recurrentDEL, chr16:21665000-21728000]   # uniform full-gene CN cannot represent (partial-gene del)
  liftover_regions:                # single collinear DIRECT block (~99% id, no ≥300bp indel); 3'-dup only
  - - OTOA
    - chr16:21729043-21763000
  - - OTOAP1
    - chr16:22545168-22579142
  map: data/hg38/OTOA_OTOAP1.dat
  conversion_regions:
  - region: "chr16:21729043-21763000"   # OTOA 3' body: OTOAP1->OTOA conversion (p.Glu787* c.2359G>T = DFNB22 allele)
    fusion_detection: false             # internal conversion, not a terminal fusion
    min_num_signals: 3                  # high identity: ≥3 PSVs for a tract (tune). p.Glu787* typed directly in
                                        # genes/otoa.py regardless. NB ~15kb mid-block PSV desert (21,739-21,754k).
  config:
    cn_priors:
      # OTOA: allow deletion (recurrent DFNB22 ~500kb NAHR del removes the whole gene; carrier ~0.1-0.2%).
      # OTOAP1 pseudogene near-conserved. Tune in validation.
      OTOA:   {0: 0.0008, 1: 0.003, 2: 0.995, 3: 0.0007, 4: 0.0005}
      OTOAP1: {0: 0.005, 1: 0.02, 2: 0.965, 3: 0.005, 4: 0.005}
    longdel_priors:
      OTOA_recurrentDEL: 0.003     # TEST: ~0.3% recurrent-deletion carrier frequency
main:
  cnv_model: data/SentieonGeneCaller0.1.bundle/cnv.model
  min_map_qual: 45
  cn_prior_std: 2
  conversion_db: data/hg38/known_gene_conversions.tsv
