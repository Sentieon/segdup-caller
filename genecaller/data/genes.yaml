  gene_regions:
  - chr1:196652043-196948803
  cn_regions:
   - [CFH, chr1:196742575-196747504]
   - [CFHR31, chr1:196774840-196832189]
   - [CFHR142, chr1:196814300-196936300]
   - [CFHR2, chr1:196936300-196948803]
  exclusion_regions:
   - chr1:196747505-196774840
   - chr1:196832190-196888052
  liftover_regions:
  - - CFHA
    - chr1:196786960-196789632,chr1:196789633-196809521,chr1:196812529-196817005,chr1:196817006-196824780,chr1:196742575-196747504
  - - CFHB
    - chr1:196911484-196914172,chr1:196914546-196934426,chr1:196934427-196938898,chr1:196941030-196948803,chr1:196827190-196832189
