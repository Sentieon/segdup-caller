CYP2D6:
  gene_strand: "-"
  diff_vcf:
  - data/CYP2D6.vcf.gz
  - data/CYP2D7.vcf.gz
  gene_names:
  - CYP2D6
  - CYP2D7
  gene_regions:
  - chr22:42123192-42132193
  - chr22:42135344-42145873
  liftover_regions:
  - - CYP2D6
    - chr22:42123192-42125960,chr22:42125961-42132193
  - - CYP2D7
    - chr22:42135344-42138112,chr22:42139675-42145873
  map: data/CYP2D6_CYP2D7.dat
  cnv_exclude_regions: []
  recombination_regions:
    - chr22:42126500-42126800  # Exon 9 - for CYP2D6*36 & *4N
    - chr22:42126800-42128000  # Intron 7 - major recombination hotspot
    - chr22:42129700-42130900  # Intron 1 - major recombination hotspot
  conversion_regions:
  - region: "chr22:42123192-42132193"
    fusion_detection: true
    three_prime_terminus: 42126499
    five_prime_terminus: 42130865
  config:
    prior_type: gamma        # Allows asymmetric distribution
    gamma_shape: 3.0         # Shape parameter (α)
    gamma_scale: 0.67        # Scale parameter (β), mean = α×β = 2.0
    transition_rate_background: 1e-8  # Very sticky in stable exonic regions
    transition_rate_hotspot: 0.001    # Loose in recombination hotspots
    star_allele_file: data/cyp2d6_star_alleles.tsv
    backbone_file: data/cyp2d6_backbone.tsv
