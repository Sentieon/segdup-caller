  config:
    cn_priors:
      CFH: {0: 0.0005, 1: 0.0005, 2: 0.998, 3: 0.0005, 4: 0.0005}  # Very conserved
      CFHR31: {0: 0.19, 1: 0.3, 2: 0.5, 3: 0.005, 4: 0.005}      # Het del most common, hom del next
      CFHR142: {0: 0.02, 1: 0.08, 2: 0.89, 3: 0.005, 4: 0.005}    # Deletion less common than CFHR31
      CFHR2: {0: 0.0005, 1: 0.0005, 2: 0.998, 3: 0.0005, 4: 0.0005}    # Very conserved
