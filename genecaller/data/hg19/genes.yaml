  cnv_exclude_regions: []
  recombination_regions:
    - chr22:42522502-42522802  # Exon 9 - for CYP2D6*36 & *4N
    - chr22:42522802-42524002  # Intron 7 - major recombination hotspot
    - chr22:42525702-42526902  # Intron 1 - major recombination hotspot
  conversion_regions:
  - region: "chr22:42519196-42528200"
